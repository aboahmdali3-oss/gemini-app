<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOMAAN | علي جمعان</title>
    <style>
        /* تصميم عصري بتباين عالٍ */
        body {
            background-color: #000;
            /* خلفية سوداء */
            color: #fff;
            /* خط أبيض */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            border: 2px solid #fff;
            /* إطار أبيض */
            padding: 60px 40px;
            max-width: 80%;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 900;
        }

        .subtitle {
            font-size: 1.2rem;
            border-top: 1px solid #fff;
            margin-top: 20px;
            padding-top: 20px;
            letter-spacing: 3px;
            color: #ccc;
        }

        .description {
            font-size: 1rem;
            margin-top: 10px;
            color: #888;
        }

        .btn {
            margin-top: 40px;
            display: inline-block;
            padding: 12px 30px;
            background-color: #fff;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.4s ease;
            border: 1px solid #fff;
        }

        .btn:hover {
            background-color: #000;
            color: #fff;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>GOMAAN</h1>
        <div class="subtitle">خوارزمية الربح | PROFIT ALGO</div>
        <div class="description">مطور برمجيات وأتمتة ذكية</div>
        <a href="https://github.com/aboahmdali3-oss" class="btn">اكتشف مشاريعي</a>
    </div>
</body>

</html>
